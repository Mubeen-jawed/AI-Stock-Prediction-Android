name: Update AI data (daily)

on:
  schedule:
    # 14:00 UTC = 19:00 PKT, ~1h after PSX close (3:30 PM PKT).
    # Mon-Fri only, Yahoo has no new candles on weekends.
    - cron: "0 14 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ai-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/ai-models/price-prediction/requirements.utf8.txt

      - name: Install Python deps
        working-directory: backend/ai-models/price-prediction
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.utf8.txt

      - name: Start prediction API in background
        working-directory: backend/ai-models/price-prediction
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8001 \
            > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid
          # Wait for /health to respond (max ~60s, TF loads on import)
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8001/health > /dev/null 2>&1; then
              echo "API up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start. Logs:"
          cat uvicorn.log
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Run incremental data update
        working-directory: backend
        env:
          PYTHON_API_URL: http://127.0.0.1:8001
        run: node scripts/update_kmi30_data.js

      - name: Stop prediction API
        if: always()
        working-directory: backend/ai-models/price-prediction
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" 2>/dev/null || true
          fi

      - name: Commit & push updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/ai-models/price-prediction/data/*.csv
          if git diff --cached --quiet; then
            echo "No data changes, nothing to commit."
            exit 0
          fi
          git commit -m "chore(ai-data): daily PSX update $(date -u +%Y-%m-%d)"
          # Retry once if a concurrent push beats us.
          git push || (git pull --rebase && git push)
