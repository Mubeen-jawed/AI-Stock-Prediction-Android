name: Retrain AI models (weekly)

on:
  schedule:
    # Sundays 16:00 UTC = 21:00 PKT, well after Friday close,
    # uses Friday's freshly-updated CSVs from the daily workflow.
    - cron: "0 16 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ai-models-retrain
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    # LSTM retrain for ~50 symbols on a CPU runner is the long pole.
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/ai-models/price-prediction/requirements.utf8.txt

      - name: Install Python deps
        working-directory: backend/ai-models/price-prediction
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.utf8.txt

      # We want the absolute freshest data before training. Run the same
      # uvicorn + node script combo as the daily workflow, then train.
      - name: Start prediction API in background
        working-directory: backend/ai-models/price-prediction
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8001 \
            > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8001/health > /dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          cat uvicorn.log
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Refresh CSVs to latest
        working-directory: backend
        env:
          PYTHON_API_URL: http://127.0.0.1:8001
        run: node scripts/update_kmi30_data.js

      - name: Stop prediction API
        if: always()
        working-directory: backend/ai-models/price-prediction
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" 2>/dev/null || true
          fi

      - name: Retrain LSTM models
        working-directory: backend/ai-models/price-prediction
        run: python train_scripts/train_lstm.py

      - name: Retrain Prophet models
        working-directory: backend/ai-models/price-prediction
        run: python train_scripts/train_prophet.py
        continue-on-error: true

      - name: Commit & push updated data + models
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/ai-models/price-prediction/data/*.csv
          git add backend/ai-models/price-prediction/models/*.keras \
                  backend/ai-models/price-prediction/models/*_scaler.pkl \
                  backend/ai-models/price-prediction/models/*_prophet.pkl
          if git diff --cached --quiet; then
            echo "No retrain changes, nothing to commit."
            exit 0
          fi
          git commit -m "chore(ai-models): weekly retrain $(date -u +%Y-%m-%d)"
          git push || (git pull --rebase && git push)
